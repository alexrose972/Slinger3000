function inferVertical(brandName) {
  const q = brandName.trim().toLowerCase();
  for (const [k, v] of Object.entries(KNOWN_BRANDS)) {
    if (q.includes(k) || k.includes(q)) return v;
  }
  for (const [vertical, kws] of KEYWORDS) {
    if (kws.some(kw => q.includes(kw))) return vertical;
  }
  return null;
}

function getMatches(targetText) {
  const brands = targetText.split(/,|\n/).map(s => s.trim()).filter(Boolean);
  return brands.map(brand => {
    const vertical = inferVertical(brand);
    if (!vertical) return null;
    const customers = VERTICAL_CUSTOMERS[vertical] || [];
    return { brand, vertical, label: VERTICAL_LABELS[vertical] || vertical, customers };
  }).filter(Boolean);
}

- Is loyalty a core product for your current vendor, or a feature alongside something else?
- Who owns your loyalty program day-to-day — marketing or engineering?

Visual UGC:
- Yotpo collects and displays customer photos and videos alongside reviews
- UGC can be syndicated to retail partner PDPs and used in paid social campaigns
- Okendo and most competitors have weaker or no UGC capabilities

AI Discoverability:
- 50% of shoppers now use AI tools (ChatGPT, Perplexity, Google AI Overviews) to research before buying
- Yotpo AI Review Summaries drive a 5.4% lift in conversion
- Queries like "best [product] for [use case]" pull Yotpo review content directly into AI answers
- Structured review data from Yotpo feeds into Google Shopping, AI Overviews, and LLM-based search results

Integrations:

- Also integrates with: Attentive, Google Shopping (star ratings in PLAs), Meta, Salesforce Commerce Cloud, Shopify Plus
- Yotpo does NOT have its own email or SMS product — it powers the stack you already use
- Yotpo + Klaviyo is a stronger pairing than Okendo + Klaviyo because the integration is deeper and native

Contract Buyout:

Win-back:
- Reference the specific gap that caused the churn
- Lead with what has changed on the product side since they left

━━━ LENGTH RULE — NON-NEGOTIABLE ━━━
Every email body must be 60–120 words. No exceptions. No email may exceed 120 words.
Before outputting each email, count the words. If it exceeds 120 words, cut it. If it is under 60 words, expand it slightly.
This is the single most important constraint. A 30-second read is the maximum. A 15-second read is the minimum.

━━━ NO HALLUCINATION RULE — NON-NEGOTIABLE ━━━
Only use stats, numbers, customer names, and facts that are explicitly listed in the content library above.
Do not invent statistics, percentages, customer names, or product capabilities.
If you don't have a specific stat for a claim, make the point without the number rather than fabricating one.

━━━ SEQUENCE THREAD CADENCE ━━━
The emails must read like a real human thread — not a series of disconnected blasts.

EMAIL 1: Normal opener. Introduce yourself and make one specific point.
EMAIL 2: Open as a natural follow-up. Examples: "Wanted to follow up on this.", "Following up in case this got buried.", "One thing I forgot to mention in my last note."
EMAIL 3: Add a new angle with a conversational transition. Examples: "Forgot to mention this earlier.", "One more thing worth sharing.", "Had another thought after my last email."
EMAIL 4: Add stakes or urgency from a real insight. Examples: "Wanted to add one more thing before I stop filling your inbox.", "This came to mind after my last note."
EMAIL 5: Final note. Easy out, low pressure, no hard sell. Examples: "Last one from me.", "I'll leave it here.", "Didn't want to leave without mentioning this."

Each email opens with one of these natural thread openers (except Email 1). The opener should feel like a real person picking up a conversation, not a marketing sequence.
Never repeat the same opener across emails in a sequence.

━━━ UNIVERSAL WRITING RULES ━━━
These apply regardless of persona. They are non-negotiable.

- EM DASHES ARE STRICTLY FORBIDDEN. The character "—" must never appear anywhere in any email. Not in the subject line, not in the body, not in the sign-off. Use a comma or period instead. Every time.
- Every email (including follow-ups after the thread opener) must lead with a YOU or BRAND statement. The first substantive sentence must be about the recipient, their brand, their category, their customers, or something specific to them. Never open with a general market observation, industry trend, or statement about Yotpo. Wrong: "AI is changing how shoppers discover products." Right: "{{Account Name}} has strong review volume — the question is whether that content is reaching shoppers before they start searching."
- No binary setups: no "not just X, but Y" or "it's not about X, it's about Y."
- No AI tells: never use "Furthermore", "Moreover", "Additionally", "In conclusion", "It's worth noting", "Importantly."
- Never use: "synergies", "leverage", "unlock", "game-changer", "revolutionize", "I wanted to reach out", "hope this finds you well", "touch base", "circle back."
- No self-referential openers: never start with "At Yotpo..." or "We at Yotpo..."
- Use real names, real logos, real numbers from the content library only. Never invent.
- No bullet lists in email bodies.
- Every email in a sequence introduces a new angle. Never repeat what was said in a previous email.
- All emails in a series share the SAME subject line. Do not write a new subject per email.
- Use {{First Name}} and {{Account Name}} as personalization tokens.

${audienceRules}

${senderRules}

━━━ OUTPUT FORMAT ━━━
Follow this exactly. No deviations, no extra headers, no markdown formatting inside emails.

Write 5 subject line options. Each one must be meaningfully different from the others — different angle, different hook, different length. Do not write variations of the same idea. Think of them as 5 competing approaches a human would test:
- One could be a question
- One could be a short statement (under 5 words)
- One could reference the brand or category specifically
- One could lead with a number or stat
- One could be curiosity-driven without being clickbait

SUBJECT_1: [subject line option 1]
SUBJECT_2: [subject line option 2]
SUBJECT_3: [subject line option 3]
SUBJECT_4: [subject line option 4]
SUBJECT_5: [subject line option 5]

EMAIL_1:
[full email body]

EMAIL_2:
[full email body]

(continue for however many emails were requested)`;
}

// ─── Parse response ───────────────────────────────────────────────────────────
function parseResponse(text) {
  const subjects = [];
  for (let i = 1; i <= 5; i++) {
    const m = text.match(new RegExp(`SUBJECT_${i}:\\s*(.+)`, "i"));
    if (m) subjects.push(m[1].trim());
  }
  const parts = text.split(/EMAIL_(\d+):\s*/i);
  const emails = [];
  for (let i = 1; i < parts.length; i += 2) {
    const num = parseInt(parts[i]);
    const body = (parts[i + 1] || "").trim();
    if (body) emails.push({ num, body });
  }
  return { subjects, emails };
}

function readTime(text) {
  const words = text.trim().split(/\s+/).length;
  const seconds = Math.round((words / 238) * 60);
  return seconds < 60 ? `${seconds}s read` : `${Math.round(seconds / 60)}m read`;
}

          {/* Context pills */}
          <div style={{ display: "flex", gap: 8, marginBottom: "1.5rem", flexWrap: "wrap" }}>
            {lastAngle && <span style={{ fontSize: 12, fontWeight: 600, color: Y.white, background: Y.navy, borderRadius: 20, padding: "3px 10px" }}>{lastAngle}</span>}
            {lastTarget && <span style={{ fontSize: 12, color: Y.textSecondary, background: Y.tagBg, border: `1.5px solid ${Y.tagBorder}`, borderRadius: 20, padding: "3px 10px" }}>{lastTarget.split(/,|\n/)[0].trim()}{lastTarget.split(/,|\n/).filter(s=>s.trim()).length > 1 ? ` +${lastTarget.split(/,|\n/).filter(s=>s.trim()).length - 1} more` : ""}</span>}
          </div>

          {/* Subject lines */}
          <div style={{ marginBottom: "1.75rem" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: Y.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>Subject lines — click to select</div>
            {subjects.map((s, i) => (
              <div key={i} onClick={() => setSelSub(i)} style={{
                padding: "12px 16px", borderRadius: Y.radius,
                border: selSub === i ? `2px solid ${Y.navy}` : `1.5px solid ${Y.border}`,
                background: selSub === i ? Y.offWhite : Y.white,
                cursor: "pointer", marginBottom: 8, display: "flex", gap: 14, alignItems: "flex-start", transition: "all 0.1s",
              }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: selSub === i ? Y.navy : Y.textMuted, minWidth: 18, paddingTop: 3 }}>{i + 1}</span>
                <span style={{ fontSize: 14, color: Y.textPrimary, lineHeight: 1.5, flex: 1 }}>{s}</span>
                <button onClick={ev => { ev.stopPropagation(); copySubject(i, s); }} style={{ fontSize: 12, color: copied === `sub_${i}` ? Y.navy : Y.textMuted, background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", fontWeight: copied === `sub_${i}` ? 700 : 400, flexShrink: 0, paddingTop: 2 }}>
                  {copied === `sub_${i}` ? "✓" : "Copy"}
                </button>
              </div>
            ))}
          </div>

          <div style={divider} />

          {subjects[selSub] && (
            <div style={{ marginBottom: "1.5rem" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: Y.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>Selected subject line</div>
              <div style={{ fontSize: 16, fontWeight: 600, color: Y.navy }}>{subjects[selSub]}</div>
            </div>
          )}

          {/* Email cards */}
          {emails.map(e => (
            <div key={e.num} style={card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: Y.navy, textTransform: "uppercase", letterSpacing: "0.08em" }}>Email {e.num}</div>
                  <div style={{ fontSize: 11, color: Y.textMuted, background: Y.offWhite, border: `1px solid ${Y.border}`, borderRadius: 4, padding: "2px 6px" }}>{readTime(e.body)}</div>
                </div>
                <button onClick={() => copyOne(e.num, e.body)} style={{ fontSize: 12, color: copied === e.num ? Y.navy : Y.textMuted, background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", fontWeight: copied === e.num ? 700 : 400 }}>
                  {copied === e.num ? "✓ Copied" : "Copy"}
                </button>
              </div>
              <div style={{ fontSize: 14, lineHeight: 1.85, color: Y.textPrimary, whiteSpace: "pre-wrap" }}>{e.body}</div>
            </div>
          ))}

          {/* Feedback */}
          <div style={{ background: Y.offWhite, border: `1.5px solid ${Y.border}`, borderRadius: Y.radiusLg, padding: "1.25rem 1.5rem", marginTop: "0.5rem" }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: Y.navy, marginBottom: 10 }}>Refine these emails</div>
            <textarea
              style={{ ...inputStyle, resize: "vertical", minHeight: 76, background: Y.white }}
              value={feedback}
              onChange={e => setFeedback(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) applyFeedback(); }}
              placeholder={`"Make email 2 shorter" · "Lead with the conversion stat" · "More edge on email 1"`}
            />
            <ErrorBox msg={error} />
            <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 12 }}>
              <Btn variant="primary" disabled={feedbackLoading || !feedback.trim()} onClick={applyFeedback}>
                {feedbackLoading ? <><Spinner />Rewriting...</> : "Apply feedback"}
              </Btn>
              <span style={{ fontSize: 12, color: Y.textMuted }}>or Cmd+Enter</span>
            </div>
          </div>
        </>
      )}
    </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Slinger />);
</script>
</body>
</html>
