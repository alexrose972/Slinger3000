function inferVertical(brandName) {
  const q = brandName.trim().toLowerCase();
  for (const [k, v] of Object.entries(KNOWN_BRANDS)) {
    if (q.includes(k) || k.includes(q)) return v;
  }
  for (const [vertical, kws] of KEYWORDS) {
    if (kws.some(kw => q.includes(kw))) return vertical;
  }
  return null;
}

function getMatches(targetText) {
  const brands = targetText.split(/,|\n/).map(s => s.trim()).filter(Boolean);
  return brands.map(brand => {
    const vertical = inferVertical(brand);
    if (!vertical) return null;
    const customers = VERTICAL_CUSTOMERS[vertical] || [];
    return { brand, vertical, label: VERTICAL_LABELS[vertical] || vertical, customers };
  }).filter(Boolean);
}

━━━ TONE AND STYLE RULES ━━━
Follow these exactly. They are non-negotiable.

- Emails must be readable in 15 seconds. Short. Punchy. Every sentence earns its place.
- Email 1 opens with a one-sentence human intro: who Alex is and why she's writing. Example: "I'm Alex, I work on product marketing at Yotpo, and I'm reaching out to a handful of brands we think could be a strong fit." Keep it natural, not corporate.

- Each follow-up email introduces one new angle, stat, or proof point. Never repeat what was already said in a previous email.
- The final email is 3-5 sentences. Low pressure. Easy out. Something like "last one from me" energy.
- Never use em-dashes. Use commas or periods instead.

// ─── Parse response ───────────────────────────────────────────────────────────
function parseResponse(text) {
  const subjects = [];
  for (let i = 1; i <= 5; i++) {
    const m = text.match(new RegExp(`SUBJECT_${i}:\\s*(.+)`, "i"));
    if (m) subjects.push(m[1].trim());
  }
  const parts = text.split(/EMAIL_(\d+):\s*/i);
  const emails = [];
  for (let i = 1; i < parts.length; i += 2) {
    const num = parseInt(parts[i]);
    const body = (parts[i + 1] || "").trim();
    if (body) emails.push({ num, body });
  }
  return { subjects, emails };
}

// ─── Read time estimate ───────────────────────────────────────────────────────
function readTime(text) {
  const words = text.trim().split(/\s+/).length;
  const seconds = Math.round((words / 238) * 60);
  return seconds < 60 ? `${seconds}s read` : `${Math.round(seconds / 60)}m read`;
}

      {matches.map(({ brand, label, customers }) => (
        <div key={brand} style={{ fontSize: 12, color: "#333333", lineHeight: 1.6 }}>
          <strong>{brand}</strong> → {label}: {customers.slice(0, 4).join(', ')}{customers.length > 4 ? ` +${customers.length - 4} more` : ''}
        </div>
      ))}
    </div>
  );
}

// ─── Loading screen ───────────────────────────────────────────────────────────
function LoadingScreen({ target, angle }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "5rem 2rem", gap: 20 }}>
      <div style={{ width: 48, height: 48, borderRadius: 14, background: Y.navy, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <svg width="22" height="22" viewBox="0 0 22 22" style={{ animation: "spin 1s linear infinite" }}>
          <circle cx="11" cy="11" r="8" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="2.5" />
          <path d="M11 3a8 8 0 0 1 8 8" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" />
        </svg>
      </div>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: Y.navy, marginBottom: 6 }}>Slinging your emails...</div>
        <div style={{ fontSize: 13, color: Y.textMuted }}>
          {target && angle ? `${angle} sequence for ${target.split(/,|\n/)[0].trim()}` : "Generating your sequence"}
        </div>
      </div>
    </div>
  );
}

// ─── Main component ───────────────────────────────────────────────────────────
function Slinger() {
  const useHardcoded = HARDCODED_API_KEY.trim().length > 0;
  const [apiKey,      setApiKey]      = useState(() => useHardcoded ? HARDCODED_API_KEY : (localStorage.getItem(STORAGE_KEY) || ""));
  const [showKeyField, setShowKeyField] = useState(false);
  const [showKey,     setShowKey]     = useState(false);
  const [rememberKey, setRememberKey] = useState(() => !!localStorage.getItem(STORAGE_KEY));
  const [target,      setTarget]      = useState("");
  const [angle,       setAngle]       = useState("");
  const [count,       setCount]       = useState(3);
  const [context,     setContext]     = useState("");
  const [step,        setStep]        = useState("form");
  const [error,       setError]       = useState("");
  const [subjects,    setSubjects]    = useState([]);
  const [selSub,      setSelSub]      = useState(0);
  const [emails,      setEmails]      = useState([]);
  const [history,     setHistory]     = useState([]);
  const [feedback,    setFeedback]    = useState("");
  const [feedbackLoading, setFeedbackLoading] = useState(false);
  const [copied,      setCopied]      = useState(null);
  const [lastTarget,  setLastTarget]  = useState("");
  const [lastAngle,   setLastAngle]   = useState("");

  const liveMatches = useMemo(() => getMatches(target), [target]);

  useEffect(() => {
    if (!useHardcoded) {
      if (rememberKey && apiKey.trim()) localStorage.setItem(STORAGE_KEY, apiKey.trim());
      else if (!rememberKey) localStorage.removeItem(STORAGE_KEY);
    }
  }, [apiKey, rememberKey, useHardcoded]);

  const resolvedKey = useHardcoded ? HARDCODED_API_KEY : apiKey;

  async function callAPI(messages, matches) {
    if (!resolvedKey.trim()) throw new Error("Please enter your Anthropic API key.");
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": resolvedKey.trim(),
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 3000,
        system: buildSystem(matches || []),
        messages,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || `API error ${res.status}`);
    return data.content.map(b => b.type === "text" ? b.text : "").join("");
  }

  async function generate() {
    setError("");
    if (!resolvedKey.trim()) { setError("Please enter your Anthropic API key."); return; }
    if (!target.trim()) { setError("Please enter a brand, brand list, or segment."); return; }
    if (!angle)         { setError("Please select an angle."); return; }
    setLastTarget(target.trim());
    setLastAngle(angle);
    setStep("loading");
    const userMsg = {
      role: "user",
      content: `Write a ${count}-email outbound sequence targeting: ${target}\nAngle: ${angle}${context ? `\nAdditional context: ${context}` : ""}\n\nWrite all ${count} emails now. Follow the output format exactly.`,
    };
    try {
      const text = await callAPI([userMsg], liveMatches);
      const parsed = parseResponse(text);
      if (!parsed.emails.length) throw new Error("Couldn't parse emails from response. Try again.");
      setSubjects(parsed.subjects);
      setEmails(parsed.emails);
      setSelSub(0);
      setHistory([{ role: "user", content: userMsg.content }, { role: "assistant", content: text }]);
      setFeedback("");
      setStep("results");
    } catch (e) {
      setError(e.message || "Something went wrong. Please try again.");
      setStep("form");
    }
  }

  async function applyFeedback() {
    if (!feedback.trim()) return;
    setFeedbackLoading(true);
    setError("");
    const subjectBlock  = subjects.map((s, i) => `SUBJECT_${i + 1}: ${s}`).join("\n");
    const currentEmails = emails.map(e => `EMAIL_${e.num}:\n${e.body}`).join("\n\n");
    const feedbackMsg = {
      role: "user",
      content: `Current output:\n${subjectBlock}\n\n${currentEmails}\n\nFeedback: ${feedback}\n\nRewrite applying this feedback. Keep everything that works. Use the exact same output format.`,
    };
    try {
      const text = await callAPI([...history, feedbackMsg], liveMatches);
      const parsed = parseResponse(text);
      if (!parsed.emails.length) throw new Error("Couldn't parse the rewrite. Try again.");
      setSubjects(parsed.subjects);
      setEmails(parsed.emails);
      setHistory([...history, feedbackMsg, { role: "assistant", content: text }]);
      setFeedback("");
    } catch (e) {
      setError(e.message || "Something went wrong.");
    } finally {
      setFeedbackLoading(false);
    }
  }

  function flash(id) { setCopied(id); setTimeout(() => setCopied(null), 2000); }
  function copyAll() {
    const sub  = subjects[selSub] || subjects[0] || "";
    const body = emails.map(e => `Email ${e.num}\n${e.body}`).join("\n\n---\n\n");
    navigator.clipboard.writeText(`Subject: ${sub}\n\n${body}`);
    flash("all");
  }
  function copyOne(num, body) { navigator.clipboard.writeText(body); flash(num); }
  function copySubject(idx, text) { navigator.clipboard.writeText(text); flash(`sub_${idx}`); }

  const wrap = { maxWidth: 680, padding: "1.5rem 1rem 3rem", fontFamily: "'Inter', system-ui, sans-serif", color: Y.textPrimary, width: "100%" };
  const card = { background: Y.white, border: `1.5px solid ${Y.border}`, borderRadius: Y.radiusLg, padding: "1.25rem 1.5rem", marginBottom: "1rem" };
  const divider = { height: 1, background: Y.border, marginBottom: "1.5rem" };

  return (
    <div style={wrap}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: "2rem" }}>
        <div style={{ width: 38, height: 38, borderRadius: 10, background: Y.navy, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M4 6h12M4 10h8M4 14h5" stroke="white" strokeWidth="1.8" strokeLinecap="round" />
          </svg>
        </div>
        <div>
          <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: "-0.02em", color: Y.navy, lineHeight: 1.2 }}>Slinger 3000</div>
          <div style={{ fontSize: 12, color: Y.textMuted }}>Reviews · Loyalty · UGC · AI Discoverability · dynamic matching</div>
        </div>
      </div>

      {/* ── LOADING ── */}
      {step === "loading" && <LoadingScreen target={lastTarget} angle={lastAngle} />}

      {/* ── FORM ── */}
      {step === "form" && (
        <>
          {/* API Key — collapsed by default */}
          {!useHardcoded && (
            <div style={{ marginBottom: "1.4rem" }}>
              <button onClick={() => setShowKeyField(v => !v)} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6, padding: 0 }}>
                <span style={{ fontSize: 12, color: apiKey.trim() ? Y.green : Y.textMuted }}>
                  {apiKey.trim() ? "✓ API key set" : "⚠ No API key"}
                </span>
                <span style={{ fontSize: 12, color: Y.textMuted }}>{showKeyField ? "▲" : "▼"}</span>
              </button>
              {showKeyField && (
                <div style={{ marginTop: 10 }}>
                  <div style={{ position: "relative" }}>
                    <input
                      type={showKey ? "text" : "password"}
                      style={{ ...inputStyle, paddingRight: 60 }}
                      value={apiKey}
                      onChange={e => setApiKey(e.target.value)}
                      placeholder="sk-ant-api03-..."
                    />
                    <button onClick={() => setShowKey(v => !v)} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 12, color: Y.textMuted, fontFamily: "inherit" }}>
                      {showKey ? "Hide" : "Show"}
                    </button>
                  </div>
                  <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 8 }}>
                    <input id="remember-key" type="checkbox" checked={rememberKey} onChange={e => setRememberKey(e.target.checked)} style={{ cursor: "pointer", accentColor: Y.navy, width: 14, height: 14 }} />
                    <label htmlFor="remember-key" style={{ fontSize: 12, color: Y.textMuted, cursor: "pointer", userSelect: "none" }}>Remember key on this device</label>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Target */}
          <Field label="Target" hint="Enter a brand name, comma-separated list, or segment. Matching brands get lookalike data auto-injected.">
            <textarea
              style={{ ...inputStyle, resize: "vertical", minHeight: 72 }}
              value={target}
              onChange={e => setTarget(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) generate(); }}
              placeholder={"Therabody\nor: Gymshark, Fabletics, Under Armour\nor: Bazaarvoice customers in apparel"}
            />
            <MatchBadge matches={liveMatches} />
          </Field>

          {/* Angle */}
          <Field label="Angle">
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {ANGLES.map(a => (
                <button key={a} onClick={() => setAngle(a)} style={{
                  padding: "9px 15px", borderRadius: Y.radius,
                  border: angle === a ? `2px solid ${Y.navy}` : `1.5px solid ${Y.tagBorder}`,
                  background: angle === a ? Y.navy : Y.tagBg,
                  color: angle === a ? Y.white : Y.textPrimary,
                  fontWeight: angle === a ? 600 : 400, fontSize: 13,
                  cursor: "pointer", fontFamily: "inherit", letterSpacing: "-0.01em", transition: "all 0.1s",
                }}>{a}</button>
              ))}
            </div>
          </Field>

          {/* Count */}
          <Field label="Emails in series">
            <div style={{ display: "flex", gap: 8 }}>
              {[1,2,3,4,5].map(n => (
                <button key={n} onClick={() => setCount(n)} style={{
                  width: 44, height: 44, borderRadius: Y.radius,
                  border: count === n ? `2px solid ${Y.navy}` : `1.5px solid ${Y.tagBorder}`,
                  background: count === n ? Y.navy : Y.tagBg,
                  color: count === n ? Y.white : Y.textPrimary,
                  fontWeight: count === n ? 600 : 400, fontSize: 15,
                  cursor: "pointer", fontFamily: "inherit", transition: "all 0.1s",
                }}>{n}</button>
              ))}
            </div>
          </Field>

          {/* Context */}
          <Field label="Additional context" optional hint="Stack, pain points, recent news, specific contacts, relevant competitors, anything else.">
            <textarea
              style={{ ...inputStyle, resize: "vertical", minHeight: 80 }}
              value={context}
              onChange={e => setContext(e.target.value)}
              placeholder="e.g. They use PowerReviews, expanding into Mattress Firm, ~$500M revenue, high consideration purchase..."
            />
          </Field>

          <ErrorBox msg={error} />
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <Btn variant="primary" onClick={generate}>Generate emails →</Btn>
            <span style={{ fontSize: 12, color: Y.textMuted }}>or Cmd+Enter</span>
          </div>
        </>
      )}

      {/* ── RESULTS ── */}
      {step === "results" && (
        <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1.25rem" }}>
            <Btn variant="ghost" onClick={() => { setStep("form"); setEmails([]); setSubjects([]); }}>← Start over</Btn>
            <Btn variant="navy" onClick={copyAll}>{copied === "all" ? "✓ Copied" : "Copy all"}</Btn>
          </div>

          {/* Context pill */}
          {(lastTarget || lastAngle) && (
            <div style={{ display: "flex", gap: 8, marginBottom: "1.5rem", flexWrap: "wrap" }}>
              {lastAngle && (
                <span style={{ fontSize: 12, fontWeight: 600, color: Y.white, background: Y.navy, border: `1.5px solid ${Y.navy}`, borderRadius: 20, padding: "3px 10px" }}>
                  {lastAngle}
                </span>
              )}
              {lastTarget && (
                <span style={{ fontSize: 12, color: Y.textSecondary, background: Y.tagBg, border: `1.5px solid ${Y.tagBorder}`, borderRadius: 20, padding: "3px 10px" }}>
                  {lastTarget.split(/,|\n/)[0].trim()}{lastTarget.split(/,|\n/).length > 1 ? ` +${lastTarget.split(/,|\n/).filter(s => s.trim()).length - 1} more` : ""}
                </span>
              )}
            </div>
          )}

          {/* Subject lines */}
          <div style={{ marginBottom: "1.75rem" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: Y.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>
              Subject lines — click to select
            </div>
            {subjects.map((s, i) => (
              <div key={i} onClick={() => setSelSub(i)} style={{
                padding: "12px 16px", borderRadius: Y.radius,
                border: selSub === i ? `2px solid ${Y.coral}` : `1.5px solid ${Y.border}`,
                background: selSub === i ? Y.offWhite : Y.white,
                cursor: "pointer", marginBottom: 8, display: "flex", gap: 14, alignItems: "flex-start", transition: "all 0.1s",
              }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: selSub === i ? Y.coral : Y.textMuted, minWidth: 18, paddingTop: 3 }}>{i + 1}</span>
                <span style={{ fontSize: 14, color: Y.textPrimary, lineHeight: 1.5, flex: 1 }}>{s}</span>
                <button
                  onClick={ev => { ev.stopPropagation(); copySubject(i, s); }}
                  style={{ fontSize: 12, color: copied === `sub_${i}` ? Y.coral : Y.textMuted, background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", fontWeight: copied === `sub_${i}` ? 600 : 400, flexShrink: 0, paddingTop: 2 }}
                >
                  {copied === `sub_${i}` ? "✓" : "Copy"}
                </button>
              </div>
            ))}
          </div>

          <div style={divider} />

          {subjects[selSub] && (
            <div style={{ marginBottom: "1.5rem" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: Y.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>Selected subject line</div>
              <div style={{ fontSize: 16, fontWeight: 600, color: Y.navy }}>{subjects[selSub]}</div>
            </div>
          )}

          {/* Email cards */}
          {emails.map(e => (
            <div key={e.num} style={card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: Y.navy, textTransform: "uppercase", letterSpacing: "0.08em" }}>Email {e.num}</div>
                  <div style={{ fontSize: 11, color: Y.textMuted, background: Y.offWhite, border: `1px solid ${Y.border}`, borderRadius: 4, padding: "2px 6px" }}>{readTime(e.body)}</div>
                </div>
                <button onClick={() => copyOne(e.num, e.body)} style={{ fontSize: 12, color: copied === e.num ? Y.coral : Y.textMuted, background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", fontWeight: copied === e.num ? 600 : 400 }}>
                  {copied === e.num ? "✓ Copied" : "Copy"}
                </button>
              </div>
              <div style={{ fontSize: 14, lineHeight: 1.85, color: Y.textPrimary, whiteSpace: "pre-wrap" }}>{e.body}</div>
            </div>
          ))}

          {/* Feedback */}
          <div style={{ background: Y.offWhite, border: `1.5px solid ${Y.border}`, borderRadius: Y.radiusLg, padding: "1.25rem 1.5rem", marginTop: "0.5rem" }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: Y.navy, marginBottom: 10 }}>Refine these emails</div>
            <textarea
              style={{ ...inputStyle, resize: "vertical", minHeight: 76, background: Y.white }}
              value={feedback}
              onChange={e => setFeedback(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) applyFeedback(); }}
              placeholder={`"Make email 2 shorter" · "Lead with the conversion stat" · "Swap proof brands for beauty companies"`}
            />
            <ErrorBox msg={error} />
            <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 12 }}>
              <Btn variant="primary" disabled={feedbackLoading || !feedback.trim()} onClick={applyFeedback}>
                {feedbackLoading ? <><Spinner />Rewriting...</> : "Apply feedback"}
              </Btn>
              <span style={{ fontSize: 12, color: Y.textMuted }}>or Cmd+Enter</span>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Slinger />);
</script>
</body>
</html>
